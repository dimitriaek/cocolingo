[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[dev]
  command = "vite"
  targetPort = 5173
  publish = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/@vite/*"
  to = "/@vite/:splat"
  status = 200

[[redirects]]
  from = "/client"
  to = "/client"
  status = 200

[[redirects]]
  from = "/@react-refresh"
  to = "/@react-refresh"
  status = 200

[[redirects]]
  from = "/react-refresh"
  to = "/react-refresh"
  status = 200

[[redirects]]
  from = "/@id/*"
  to = "/@id/:splat"
  status = 200

[[redirects]]
  from = "/@fs/*"
  to = "/@fs/:splat"
  status = 200

[[redirects]]
  from = "/src/*"
  to = "/src/:splat"
  status = 200

[[redirects]]
  from = "/node_modules/*"
  to = "/node_modules/:splat"
  status = 200

[[redirects]]
  from = "/assets/*"
  to = "/assets/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
